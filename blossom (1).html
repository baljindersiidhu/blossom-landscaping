<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Blossom Landscaping & Maintenance Ltd. | Calgary's Premium Landscaping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;color:#1a2a1a;background:#fff;overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block;height:auto}
a{text-decoration:none;color:inherit}
ul{list-style:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
:root{
  --g1:#1e4d2b;--g2:#2d6b3e;--g3:#3d8a52;--g4:#7ab88a;--g5:#c8e6d0;
  --sand:#f7f3ed;--sand2:#ede8de;--cream:#faf8f5;
  --ink:#1a2a1a;--mid:#4a5e4a;--muted:#8a9e8a;
  --gold:#c9a84c;--white:#fff;
  --r8:8px;--r16:16px;--r24:24px;--r50:50px;
  --sh-sm:0 2px 12px rgba(30,77,43,.08);
  --sh-md:0 8px 32px rgba(30,77,43,.12);
  --sh-lg:0 20px 60px rgba(30,77,43,.18);
  --ease:cubic-bezier(.25,.46,.45,.94);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --nav-h:72px;
}
.container{width:100%;max-width:1240px;margin:0 auto;padding:0 16px}
@media(min-width:640px){.container{padding:0 24px}}
@media(min-width:1024px){.container{padding:0 40px}}
.text-center{text-align:center}
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
.reveal-d1{transition-delay:.1s}.reveal-d2{transition-delay:.2s}.reveal-d3{transition-delay:.3s}.reveal-d4{transition-delay:.4s}
.page{display:none}.page.active{display:block}
/* LOADING */
#ls{position:fixed;inset:0;z-index:9999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s var(--ease),visibility .8s}
#ls.out{opacity:0;visibility:hidden;pointer-events:none}
.ls-logo{width:80px;height:80px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:lsPulse 1.6s ease-in-out infinite;box-shadow:0 0 50px rgba(122,184,138,.4)}
@keyframes lsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ls-name{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--g5);margin-bottom:28px}
.ls-bar{width:180px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.ls-fill{height:100%;width:0;background:linear-gradient(90deg,var(--g4),var(--g5));animation:lsBar 2s var(--ease) forwards}
@keyframes lsBar{to{width:100%}}
/* NAVBAR */
#nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);transition:background .4s,box-shadow .4s,height .3s}
#nav.scrolled{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--sh-sm);height:64px}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:100%;max-width:1240px;margin:0 auto;padding:0 16px}
@media(min-width:640px){.nav-in{padding:0 24px}}
@media(min-width:1024px){.nav-in{padding:0 40px}}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0}
.nav-logo-c{width:44px;height:44px;min-width:44px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);transition:transform .3s}
.nav-logo-c:hover{transform:scale(1.05)}
.nav-logo-t{font-size:14px;font-weight:700;color:#fff;transition:color .4s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#nav.scrolled .nav-logo-t{color:var(--ink)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center;gap:2px}}
.nav-a{padding:8px 12px;border-radius:var(--r8);font-size:13px;font-weight:500;color:rgba(255,255,255,.9);transition:all .25s;cursor:pointer;white-space:nowrap}
#nav.scrolled .nav-a{color:var(--ink)}
.nav-a:hover{color:var(--g4)}
.nav-dd{position:relative}
.nav-dd-menu{position:absolute;top:calc(100% + 10px);left:0;background:#fff;border-radius:var(--r16);box-shadow:var(--sh-lg);padding:8px;min-width:210px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .25s;border:1px solid rgba(0,0,0,.06)}
.nav-dd:hover .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-a{display:block;padding:10px 14px;font-size:13px;color:var(--ink);border-radius:10px;transition:all .2s;cursor:pointer}
.nav-dd-a:hover{background:var(--sand);color:var(--g1)}
.nav-cta{background:var(--g1)!important;color:#fff!important;padding:10px 18px!important;border-radius:var(--r50)!important;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(30,77,43,.35);transition:all .3s!important}
.nav-cta:hover{background:var(--g2)!important;transform:translateY(-2px)!important;box-shadow:0 6px 24px rgba(30,77,43,.45)!important}
.burger{display:flex;flex-direction:column;gap:5px;padding:10px;cursor:pointer;margin-right:-10px;flex-shrink:0}
@media(min-width:1024px){.burger{display:none}}
.burger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
#nav.scrolled .burger span{background:var(--ink)}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* MOBILE NAV */
#mnav{position:fixed;inset:0;z-index:999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transform:translateX(100%);transition:transform .4s var(--ease);overflow-y:auto}
#mnav.open{transform:none}
.mnav-a{font-size:1.2rem;font-weight:600;color:#fff;padding:12px 40px;border-radius:var(--r16);transition:background .2s;cursor:pointer;width:100%;max-width:300px;text-align:center}
.mnav-a:hover{background:rgba(255,255,255,.1)}
.mnav-cta{color:var(--g5)!important;font-weight:700}
.mnav-close{position:absolute;top:20px;right:20px;font-size:1.8rem;color:#fff;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s;cursor:pointer}
.mnav-close:hover{background:rgba(255,255,255,.1)}
/* FLOATING */
#floats{position:fixed;right:12px;bottom:70px;z-index:900;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity .5s;pointer-events:none}
#floats.show{opacity:1;pointer-events:all}
@media(min-width:640px){#floats{right:20px;bottom:80px}}
.fb{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:var(--r50);font-size:12px;font-weight:600;box-shadow:var(--sh-md);transition:all .3s;white-space:nowrap;cursor:pointer}
@media(min-width:640px){.fb{padding:12px 18px;font-size:13px}}
.fb-call{background:#fff;color:var(--g1);border:2px solid var(--g1)}
.fb-call:hover{background:var(--g1);color:#fff;transform:translateX(-4px)}
.fb-wa{background:#25d366;color:#fff;border:none}
.fb-wa:hover{background:#1fb357;transform:translateX(-4px)}
.fb-q{background:var(--g1);color:#fff;border:none}
.fb-q:hover{background:var(--g2);transform:translateX(-4px)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;border-radius:var(--r50);font-size:14px;font-weight:600;transition:all .3s var(--ease);cursor:pointer;text-align:center;border:none}
@media(min-width:640px){.btn{padding:14px 32px}}
.btn-p{background:var(--g1);color:#fff;box-shadow:0 4px 20px rgba(30,77,43,.3)}
.btn-p:hover{background:var(--g2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,77,43,.4)}
.btn-o{border:2px solid rgba(255,255,255,.6)!important;color:#fff;background:transparent}
.btn-o:hover{background:rgba(255,255,255,.12);border-color:#fff!important;transform:translateY(-2px)}
.btn-od{border:2px solid var(--g1)!important;color:var(--g1);background:transparent}
.btn-od:hover{background:var(--g1);color:#fff;transform:translateY(-2px)}
.btn-gold{background:var(--gold);color:#fff;box-shadow:0 4px 20px rgba(201,168,76,.35)}
.btn-gold:hover{background:#b8963c;transform:translateY(-2px)}
/* PAGE HERO */
.ph{padding:100px 16px 56px;background:linear-gradient(135deg,var(--g1) 0%,#1a3d28 100%);text-align:center;position:relative;overflow:hidden}
@media(min-width:640px){.ph{padding:130px 24px 80px}}
.ph h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,3.8rem);color:#fff;margin-bottom:14px;line-height:1.15}
.ph p{color:rgba(255,255,255,.75);font-size:clamp(.95rem,2vw,1.1rem);max-width:560px;margin:0 auto;line-height:1.7}
/* SECTIONS */
.sec{padding:60px 0}
@media(min-width:768px){.sec{padding:90px 0}}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g3);margin-bottom:10px}
.ttl{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,3rem);color:var(--g1);line-height:1.2;margin-bottom:14px}
.sub{font-size:clamp(.9rem,1.5vw,1rem);color:var(--mid);max-width:580px;margin:0 auto 48px;line-height:1.8}
/* HERO */
#hero{position:relative;min-height:100svh;min-height:100vh;display:flex;align-items:center;overflow:hidden}
.hbg{position:absolute;inset:0;background:linear-gradient(135deg,#0d2418,#1e4d2b 35%,#2d6b3e 65%,#3a7a4c);animation:hbga 14s ease-in-out infinite alternate}
@keyframes hbga{0%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(5deg) brightness(1.08)}100%{filter:hue-rotate(-3deg) brightness(.97)}}
.hov{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.5),rgba(0,0,0,.1) 60%,transparent)}
.hparts{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.pt{position:absolute;background:rgba(200,230,208,.5);border-radius:50%;animation:ptF linear infinite}
@keyframes ptF{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-80px) scale(1.5);opacity:0}}
.hdl{position:absolute;opacity:.07;pointer-events:none;animation:dlF ease-in-out infinite alternate}
@keyframes dlF{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-28px) rotate(15deg)}}
.hcon{position:relative;z-index:2;width:100%;max-width:1240px;margin:0 auto;padding:80px 16px 40px}
@media(min-width:640px){.hcon{padding:80px 24px 40px}}
@media(min-width:1024px){.hcon{padding:80px 40px 40px}}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);padding:8px 18px;border-radius:var(--r50);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--g5);margin-bottom:20px;animation:fuUp .8s var(--ease) both}
.bdot{width:6px;height:6px;background:var(--g4);border-radius:50%;animation:bdota 2s infinite}
@keyframes bdota{0%,100%{transform:scale(1)}50%{transform:scale(1.6);opacity:.7}}
.hh1{font-family:'DM Serif Display',serif;font-size:clamp(2.6rem,8vw,5.5rem);color:#fff;line-height:1.08;margin-bottom:10px;animation:fuUp .9s .12s var(--ease) both}
.hh1 em{color:var(--g5);font-style:italic}
.hsub{font-size:clamp(.95rem,2vw,1.2rem);color:rgba(255,255,255,.78);max-width:520px;margin-bottom:36px;font-weight:300;line-height:1.75;animation:fuUp 1s .25s var(--ease) both}
.hbtns{display:flex;flex-direction:column;gap:12px;animation:fuUp 1s .4s var(--ease) both;width:fit-content}
@media(min-width:480px){.hbtns{flex-direction:row;flex-wrap:wrap}}
.hscrl{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;text-transform:uppercase;animation:fdIn 1.5s 1s both;pointer-events:none}
.sw{width:22px;height:38px;border:2px solid rgba(255,255,255,.3);border-radius:12px;position:relative}
.sw::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:3px;height:7px;background:rgba(255,255,255,.6);border-radius:2px;animation:swd 2s ease-in-out infinite}
@keyframes swd{0%,100%{top:6px;opacity:1}80%{top:20px;opacity:0}}
@keyframes fuUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
/* STRIP */
.strip{background:var(--g1);overflow:hidden}
.strip-in{display:flex;width:max-content;animation:stripS 30s linear infinite}
.si{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border-right:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:500;color:rgba(255,255,255,.78);white-space:nowrap;flex-shrink:0}
.sdot{width:5px;height:5px;background:var(--g5);border-radius:50%;flex-shrink:0}
@keyframes stripS{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* SERVICES */
.sg{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:480px){.sg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.sg{grid-template-columns:repeat(4,1fr)}}
.sc{background:#fff;border:1px solid #e8ede8;border-radius:var(--r24);overflow:hidden;transition:all .4s var(--ease);cursor:pointer}
.sc:hover{transform:translateY(-8px);box-shadow:var(--sh-lg);border-color:var(--g5)}
.sc-img{height:175px;display:flex;align-items:center;justify-content:center;font-size:54px;transition:transform .6s var(--ease)}
@media(min-width:768px){.sc-img{height:200px}}
.sc:hover .sc-img{transform:scale(1.08)}
.sc-body{padding:18px}
@media(min-width:768px){.sc-body{padding:22px}}
.sc-body h3{font-size:1rem;font-weight:700;color:var(--g1);margin-bottom:6px}
.sc-body p{font-size:13px;color:var(--mid);line-height:1.65}
.sc-arr{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:600;color:var(--g1);transition:gap .3s}
.sc:hover .sc-arr{gap:10px}
/* WHY */
.wg{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:480px){.wg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:768px){.wg{grid-template-columns:repeat(3,1fr)}}
.wc{background:#fff;border:1px solid #e8ede8;border-radius:var(--r16);padding:22px;transition:all .3s}
@media(min-width:768px){.wc{padding:26px}}
.wc:hover{border-color:var(--g5);box-shadow:var(--sh-md);transform:translateY(-4px)}
.wi{width:50px;height:50px;background:linear-gradient(135deg,var(--g1),var(--g4));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.wc h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.wc p{font-size:13px;color:var(--mid);line-height:1.65}
/* SEASONAL */
.stabs{display:flex;justify-content:center;margin-bottom:40px;background:#e8ede8;border-radius:var(--r50);padding:4px;width:fit-content;margin-left:auto;margin-right:auto}
.stab{padding:10px 26px;border-radius:var(--r50);font-size:14px;font-weight:600;transition:all .3s;color:var(--mid);cursor:pointer;white-space:nowrap}
.stab.on{background:#fff;color:var(--g1);box-shadow:0 2px 12px rgba(0,0,0,.1)}
.sp{display:none}.sp.on{display:block}
.sh{border-radius:var(--r24);overflow:hidden;position:relative;min-height:300px;display:flex;align-items:flex-end}
@media(min-width:768px){.sh{min-height:400px}}
.sdeco{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.sd{position:absolute;opacity:.15;font-size:34px;animation:sdF ease-in-out infinite alternate}
@keyframes sdF{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-18px) rotate(18deg)}}
.sc2{position:relative;z-index:2;padding:26px;color:#fff;max-width:520px}
@media(min-width:768px){.sc2{padding:40px}}
.sc2 h2{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,3vw,2.6rem);line-height:1.2;margin-bottom:12px}
.sc2 p{font-size:.95rem;opacity:.85;margin-bottom:24px;line-height:1.7}
/* B/A */
.baw{position:relative;border-radius:var(--r24);overflow:hidden;cursor:ew-resize;user-select:none;touch-action:pan-y;-webkit-user-select:none}
.bal{position:absolute;inset:0;overflow:hidden}
.baline{position:absolute;top:0;bottom:0;width:3px;background:#fff;box-shadow:0 0 20px rgba(0,0,0,.3);left:50%;transform:translateX(-50%)}
.bahnd{position:absolute;top:50%;width:46px;height:46px;background:#fff;border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-size:17px;transform:translate(-50%,-50%);pointer-events:none;left:50%}
.balbl{position:absolute;bottom:16px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);padding:5px 12px;border-radius:var(--r50);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;z-index:3;pointer-events:none}
.balbl-b{left:16px;color:#8B7355}
.balbl-a{right:16px;color:var(--g1)}
/* STATS */
.statg{display:grid;grid-template-columns:repeat(2,1fr);background:var(--g1)}
@media(min-width:768px){.statg{grid-template-columns:repeat(4,1fr)}}
.stc{background:rgba(255,255,255,.05);padding:32px 16px;text-align:center;border:1px solid rgba(255,255,255,.07);transition:background .3s}
@media(min-width:768px){.stc{padding:48px 28px}}
.stc:hover{background:rgba(255,255,255,.1)}
.stnum{font-family:'DM Serif Display',serif;font-size:clamp(2.2rem,5vw,3.5rem);color:#fff;line-height:1}
.stsuf{color:var(--g5)}
.stlbl{font-size:13px;color:rgba(255,255,255,.6);margin-top:8px}
/* PROCESS */
.pg{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:640px){.pg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.pg{grid-template-columns:repeat(4,1fr)}}
.ps{text-align:center;padding:26px 18px}
.pnum{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g4));color:#fff;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 24px rgba(30,77,43,.28)}
.ps h3{font-size:1rem;font-weight:700;color:var(--g1);margin-bottom:8px}
.ps p{font-size:13px;color:var(--mid);line-height:1.65}
/* REVIEWS */
.rout{overflow:hidden;mask:linear-gradient(90deg,transparent 0%,#000 8%,#000 92%,transparent 100%);-webkit-mask:linear-gradient(90deg,transparent 0%,#000 8%,#000 92%,transparent 100%)}
.rtrack{display:flex;gap:18px;width:max-content;animation:rscroll 40s linear infinite}
.rtrack:hover{animation-play-state:paused}
@keyframes rscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.rcard{background:#fff;border:1px solid #e8ede8;border-radius:var(--r24);padding:22px;width:285px;flex-shrink:0;transition:all .3s}
@media(min-width:640px){.rcard{width:310px;padding:26px}}
.rcard:hover{box-shadow:var(--sh-md);transform:translateY(-4px)}
.rstars{color:var(--gold);font-size:14px;margin-bottom:10px;letter-spacing:2px}
.rtxt{font-size:13.5px;color:var(--mid);line-height:1.7;margin-bottom:14px;font-style:italic}
.rauth{display:flex;align-items:center;gap:10px}
.rav{width:38px;height:38px;min-width:38px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g4));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.rname{font-size:13px;font-weight:700}
.rloc{font-size:12px;color:var(--mid)}
/* WEATHER */
.wxc{background:linear-gradient(135deg,#1a3d60,#2c5f8a);border-radius:var(--r24);padding:26px;color:#fff;position:relative;overflow:hidden}
@media(min-width:768px){.wxc{padding:34px}}
.wxc::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.05);border-radius:50%}
.wxloc{font-size:12px;letter-spacing:2px;opacity:.65;margin-bottom:6px}
.wxtmp{font-size:4.2rem;font-weight:700;line-height:1;margin-bottom:4px}
.wxdesc{font-size:1rem;opacity:.78;margin-bottom:20px}
.wxtip{background:rgba(255,255,255,.1);border-radius:var(--r16);padding:14px;font-size:13px;line-height:1.65;opacity:.9}
